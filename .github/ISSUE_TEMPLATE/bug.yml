name: Bug report
description: Report a problem with media_metadata_plus
title: "[Bug]: "
labels: [ "bug" ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can so it can be reproduced quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't been reported yet.
          required: true
        - label: I am using the latest published version of `media_metadata_plus`.
          required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: flutter_version
    attributes:
      label: Flutter & Dart SDK version
      description: Output of `flutter --version`
      placeholder: "Flutter 3.24.0 • Dart 3.5.0"
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Affected platform(s)
      options:
        - label: macOS
        - label: iOS
        - label: Android
        - label: Windows
        - label: Linux

  - type: checkboxes
    id: formats
    attributes:
      label: Affected file format(s)
      options:
        - label: JPEG / JPG
        - label: HEIC / HEIF
        - label: PNG
        - label: WebP
        - label: MP4
        - label: MOV

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clearly describe the bug. What did `MediaMetadata.read()` return? Did it throw?
      placeholder: e.g. Returns null for a valid JPEG that has EXIF data.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: e.g. Should return a MediaMetadata with capturedAt set.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Paste the smallest Dart snippet that demonstrates the problem.
      render: dart
      placeholder: |
        final meta = await MediaMetadata.read('/path/to/file.jpg');
        print(meta); // null — should not be
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant console output or stack traces.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — file size, camera model, etc.
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to open a PR for this fix?
      options:
        - label: "Yes, I'd like to contribute a fix."
