name: Feature request
description: Suggest a new format, field, or API improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the use case clearly so the request can be evaluated.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
        - label: I have read the [Contributing Guidelines](../CONTRIBUTING.md).
          required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case / motivation
      description: What problem does this solve? Who would benefit?
      placeholder: e.g. I'm building a photo organiser and need to read the lens model from EXIF so I can group shots by lens.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the change you'd like — new API, new field, new format support, etc.
      placeholder: |
        Add a `lensModel` field to `MediaMetadata` populated from EXIF tag 0xa434.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other approaches that could work?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, references (EXIF spec, crate docs, etc.), or example files.
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to open a PR for this feature?
      options:
        - label: "Yes, I'd like to contribute an implementation."
