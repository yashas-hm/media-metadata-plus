name: media_metadata_plus
description: Read media metadata (EXIF, video) from JPEG, HEIC, MP4, MOV, PNG and WebP. Powered by Rust, works on all platforms.
version: 0.2.0
homepage: https://github.com/yashas-hm/media-metadata-plus
repository: https://github.com/yashas-hm/media-metadata-plus
issue_tracker: https://github.com/yashas-hm/media-metadata-plus/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      android:
        ffiPlugin: true
